{% extends "base.html" %}

{% block content %}
{% include "top-space.html" %}

{{ output | safe }}

<form action="" method="post">
{% csrf_token %}

<div class="input-group mb-3">
<div class="input-group-prepend">
    <span class="input-group-text">Beneficiary name:</span>
</div>
<input type="text" id="beneficiary_name" name="beneficiary_name" value="{{ beneficiary_name }}" class="form-control" placeholder="Type beneficiary name here" autocomplete="off">
</div>

<div class="input-group mb-3">
<div class="input-group-prepend">
    <span class="input-group-text">Guardian name:</span>
</div>
<input type="text" id="guardian_name" name="guardian_name" value="{{ guardian_name }}" class="form-control" placeholder="Type the guardian name of beneficiary here" autocomplete="off">
</div>

<div class="input-group mb-3">
<div class="input-group-prepend">
    <span class="input-group-text">Address:</span>
</div>
<input type="text" id="address" name="address" value="{{ address }}" class="form-control" placeholder="Type the address of beneficiary here" autocomplete="off">
</div>

<div class="input-group mb-3">
<div class="input-group-prepend">
    <span class="input-group-text">Mobile number:</span>
</div>
<input type="text" id="mobile_number" name="mobile_number" value="{{ mobile_number }}" class="form-control" placeholder="Type he mobile number of beneficiary here" autocomplete="off">
</div>

<p><button type="submit" class="btn btn-primary">Submit</button></p>
</form>

<p>&nbsp;</p>

{% endblock content %}
