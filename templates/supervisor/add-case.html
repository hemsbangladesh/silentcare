{% extends "base.html" %}

{% block content %}
{% include "top-space.html" %}

{{ output | safe }}

<form action="" method="post">
{% csrf_token %}

<div class="input-group mb-3">
<select name="beneficiary_id" class="form-select form-select-lg mb-3" aria-label=".form-select-lg example">
  {{ beneficiary_list | safe }}
</select>
</div>

<div class="input-group mb-3">
<select name="category_id" class="form-select form-select-lg mb-3" aria-label=".form-select-lg example">
  {{ category_options | safe }}
</select>
</div>

<div class="input-group mb-3">
<div class="input-group-prepend">
    <span class="input-group-text">Required amount:</span>
</div>
<input type="text" id="amount" name="amount" value="{{ amount }}" class="form-control" placeholder="Type the required donation amount here" autocomplete="off">
</div>

<div class="input-group mb-3">
<div class="input-group-prepend">
    <span class="input-group-text">Title:</span>
</div>
<input type="text" id="case_title" name="case_title" value="{{ case_title }}" class="form-control" placeholder="Type the case title here" autocomplete="off">
</div>

<p>Description</p>
<div class="form-group">
<p><textarea class="form-control" id="description" name="description" maxlength="70" placeholder="Write the description here" style="width: 100%; height: 75px;" onmouseover="this.focus();"></textarea></p>
</div>

<p><button type="submit" class="btn btn-primary">Submit</button></p>
</form>

<p>&nbsp;</p>

{% endblock content %}
